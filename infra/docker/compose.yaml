name: cadre-dev

services:
  postgres:
    image: postgres:16-alpine
    container_name: cadre-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: cadre
      POSTGRES_USER: cadre
      POSTGRES_PASSWORD: cadre
    ports:
      - "5432:5432"
    volumes:
      - cadre-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cadre -d cadre"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: cadre-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - cadre-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  runtime:
    build:
      context: ../..
      dockerfile: infra/docker/runtime.Dockerfile
    container_name: cadre-runtime
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      CADRE_DATABASE_URL: postgresql://cadre:cadre@postgres:5432/cadre
      CADRE_REDIS_URL: redis://redis:6379/0
      CADRE_ENV: development
    env_file:
      - ../../.env
    ports:
      - "8000:8000"
    volumes:
      - ../../services/runtime:/app/services/runtime
      - ../../packages:/app/packages:ro
    working_dir: /app/services/runtime
    command: ["uvicorn", "cadre.api:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]

volumes:
  cadre-postgres-data:
  cadre-redis-data:
