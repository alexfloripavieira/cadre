checkpoint_resume:
  write_to_sep_log: true
  fields:
    - checkpoint_cursor
    - completed_checkpoints
    - resume_from
    - fallback_invocations
    - teammate_reliability
  discovery:
    checkpoints:
      - preflight-passed
      - gate-1-approved
      - gate-2-approved
      - gate-3-approved
      - gate-4-approved
      - specialist-bench-complete
      - quality-baseline-complete
      - blueprint-confirmed
    resume_rule: resume from the highest completed checkpoint unless inputs materially changed
  implement:
    checkpoints:
      - preflight-passed
      - commands-confirmed
      - blueprint-validated
      - tdd-ready
      - implementation-batch-complete
      - reviewer-approved
      - qa-pass
      - conformance-pass
      - quality-bench-cleared
      - docs-complete
      - uat-approved
    resume_rule: resume from the highest completed checkpoint and only rerun failed downstream gates
  squad:
    checkpoints:
      - preflight-passed
      - discovery-confirmed
      - implementation-complete
      - release-signed-off
    resume_rule: resume from the last completed phase boundary unless the user requests a full rerun

reliability_metrics:
  tracked:
    - retry_count
    - fallback_invocations
    - checkpoint_cursor
    - completed_checkpoints
    - resume_from
    - teammate_reliability
    - tokens_input
    - tokens_output
    - estimated_cost_usd
    - total_duration_ms
    - teammate_durations
  teammate_reliability_states:
    - primary
    - primary-after-retry
    - fallback-used
    - skipped-with-risk
    - unresolved

observability:
  stale_in_flight:
    enabled: true
    stale_after_hours: 48
    description: >
      A SEP log with status=in_flight and last_updated_at older than
      stale_after_hours is flagged as `stale-in-flight`. Added after the
      2026-04-18 retrospective observed orphaned in-flight runs with no
      freshness signal. /dashboard and /factory-retrospective MUST surface
      these.
    on_detection: "emit [Entropy] stale-in-flight: {{run_id}} | last_updated_at={{ts}} | age_hours={{age}}"
  prompt_length_warning:
    enabled: true
    threshold_tokens: 40000
    description: >
      When the prompt assembled for a teammate exceeds the threshold, the
      orchestrator MUST emit a warning. This complements compact_prompt_fallback
      by catching pressure BEFORE the teammate starts, not after it fails.
    emit: "[Prompt Length Warning] {{agent}} | prompt_tokens={{tokens}} | threshold={{threshold}} — consider compact-prompt spawn"
  sep_log_schema:
    required_fields:
      - run_id
      - skill
      - timestamp
      - last_updated_at
      - final_status
      - execution_mode
      - architecture_style
      - checkpoints
      - fallbacks_invoked
      - retry_count
      - tokens_input
      - tokens_output
      - estimated_cost_usd
      - total_duration_ms
    teammate_fields:
      - name
      - subagent_type
      - status
      - tokens_input
      - tokens_output
      - duration_ms
      - reliability_state
    fallback_diagnostics:
      fields:
        - agent_duration_ms
        - last_tool_before_failure
      description: >
        When a teammate fails and a fallback is invoked, record these additional fields
        in the SEP log under the failed teammate's entry. agent_duration_ms captures how
        long the primary ran before failing. last_tool_before_failure identifies the tool
        call that preceded the silent exit (e.g. Read for mid-turn reviewer stops).
    trace_lines:
      - "[Preflight Start]"
      - "[Preflight Warning]"
      - "[Preflight Passed]"
      - "[Team Created]"
      - "[Teammate Spawned]"
      - "[Teammate Done]"
      - "[Teammate Retry]"
      - "[Fallback Invoked]"
      - "[Resume From]"
      - "[Checkpoint Saved]"
      - "[Gate]"
      - "[Batch Spawned]"
      - "[Cost Warning]"
      - "[Doom Loop Detected]"
      - "[Auto-Advanced]"
      - "[Health Check]"
      - "[Health Warning]"
      - "[SEP Log Written]"
  teammate_cards:
    enabled: true
    format: ascii            # ascii | compact | silent
    description: >
      After each teammate returns, the orchestrator pipes the Result Contract
      metrics JSON through plugins/claude-tech-squad/scripts/render-teammate-card.sh
      to print a compact inline card (tokens in/out, cost, duration, confidence,
      gaps, artifacts). Set format to silent in CI.
  pipeline_board:
    enabled: true
    include_budget_bar: true
    include_artifacts: true
    description: >
      At the end of an orchestrator skill run, before writing the SEP log, the
      orchestrator assembles a pipeline summary JSON and pipes it through
      plugins/claude-tech-squad/scripts/render-pipeline-board.sh to print an
      ASCII board (per-teammate rows, totals, budget bar, checkpoints, gates,
      artifacts, sep log path).

# ── Work-item taxonomy (vendor-neutral, configurable by team) ───────────────
work_item_taxonomy:
  levels:
    - name: initiative
      description: Strategic, cross-team work
    - name: epic
      description: Product-level value delivery
    - name: story
      description: Functional delivery with code
    - name: task
      description: Work without code (analysis, discovery, spike)
    - name: subtask
      description: Operational breakdown of any item above
  defect_classification:
    - name: defect
      description: Issue in delivered functionality, not necessarily in production
    - name: bug
      description: Issue in active production
  estimation:
    effort_unit: hours       # hours | days | points
    completion_unit: days    # hours | days | points

# ── Delivery gates (opt-in, policy-driven) ──────────────────────────────────
delivery_gates:
  enabled: false
  rules:
    - id: code_requires_story_not_task
      severity: WARNING
      description: Items that produce code must be mapped as story, not task
    - id: epic_needs_end_criterion
      severity: WARNING
      description: Epics need an explicit completion criterion unless tagged continuous
    - id: qa_required_for_stories
      severity: INFO
      description: Stories should include a QA step in the flow

# ── Cadre v0.1 runtime policies (ADR 0004, 0005) ────────────────────────────
# Consumed by cadre.policy.PolicyLoader.resolve(profile_name).
# Each profile maps directly to the Policy dataclass fields in
# services/runtime/cadre/policy.py. Unknown fields are rejected by the loader.
policies:
  default:
    max_retries: 3
    retry_delay_seconds: 1.0
    retry_backoff_multiplier: 2.0
    fallback_models: []
    max_budget_usd: null
    max_duration_seconds: null
    context_advisory_threshold_tokens: 100000
    context_hard_threshold_tokens: 140000

  orchestrator:
    max_retries: 2
    retry_delay_seconds: 0.5
    retry_backoff_multiplier: 2.0
    fallback_models: []
    max_budget_usd: 1.00
    max_duration_seconds: 60
    context_advisory_threshold_tokens: 100000
    context_hard_threshold_tokens: 140000

  standard-delivery:
    max_retries: 3
    retry_delay_seconds: 1.0
    retry_backoff_multiplier: 2.0
    fallback_models:
      - openai/gpt-4.1
      - groq/llama-3.3-70b
    max_budget_usd: 5.00
    max_duration_seconds: 1800
    context_advisory_threshold_tokens: 100000
    context_hard_threshold_tokens: 140000

  low-cost:
    max_retries: 2
    retry_delay_seconds: 0.5
    retry_backoff_multiplier: 2.0
    fallback_models:
      - groq/llama-3.3-70b
      - ollama/llama3
    max_budget_usd: 0.50
    max_duration_seconds: 600

  # Free-tier-only profile. Cycles through free-tier providers for smoke
  # tests, CI, and dev without spending. Requires GROQ_API_KEY and/or
  # OPENROUTER_API_KEY and/or GEMINI_API_KEY per the chain.
  free-tier:
    max_retries: 2
    retry_delay_seconds: 1.0
    retry_backoff_multiplier: 2.0
    fallback_models:
      - openrouter/deepseek/deepseek-chat-v3:free
      - openrouter/meta-llama/llama-3.3-70b-instruct:free
      - gemini/gemini-2.0-flash-exp
    max_budget_usd: null
    max_duration_seconds: 600
