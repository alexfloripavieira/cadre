name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  runtime:
    name: runtime (python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/runtime
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f pyproject.toml ]; then
            pip install -e ".[dev]"
          fi

      - name: Lint (ruff)
        run: |
          pip install ruff
          ruff check .

      - name: Format check (ruff)
        run: ruff format --check .

      - name: Tests (pytest)
        run: |
          pip install pytest
          pytest -q

  policy-lint:
    name: policy lint (yaml)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate runtime-policy.yaml
        run: |
          python -c "import yaml, sys; yaml.safe_load(open('packages/policy/runtime-policy.yaml'))"

  scripts:
    name: scripts (shellcheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Run shellcheck
        run: |
          find scripts -type f -name "*.sh" -print0 | xargs -0 -r shellcheck -x
